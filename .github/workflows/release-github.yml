---
name: release-github

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - os-name: Linux-aarch64
            runs-on: ubuntu-latest
            target: aarch64-unknown-linux-musl

          - os-name: macOS-x86_64
            runs-on: macOS-latest
            target: x86_64-apple-darwin

          - os-name: macOS-aarch64
            runs-on: macOS-latest
            target: aarch64-apple-darwin

          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc

    name: Build - ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build
        uses: houseabsolute/actions-rust-cross@21b0f18dc621b25bfae556ff2791fca4173121e8 # v1.0.8
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--release"
      - name: Compress
        shell: bash
        run: | #bash
          VERSION=${GITHUB_REF#refs/tags/}
          TARGET=${{ matrix.platform.target }}
          ASSET="rustic-exporter-$VERSION-$TARGET"

          mkdir -p "$ASSET"
          if [[ $TARGET == *"windows"* ]]; then
            cp target/$TARGET/release/rustic-exporter.exe "$ASSET"
          else
            cp target/$TARGET/release/rustic-exporter "$ASSET"
          fi

          tar -czf "${ASSET}.tar.gz" "${ASSET}"

      - name: Collect Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: "*.tar.gz"
          name: assets-${{ matrix.platform.target }}
          overwrite: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: assets-*
          path: ./dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: ./dist/*.tar.gz
