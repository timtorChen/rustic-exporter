---
name: lint-docs

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  lint:
    name: Lint documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3
