---
name: lint-docs

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  lint:
    name: Lint documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3
