---
name: lint-docs

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  lint:
    name: Lint documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3
